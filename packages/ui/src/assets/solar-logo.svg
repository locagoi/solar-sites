<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="sun" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B"/>
      <stop offset="100%" style="stop-color:#F97316"/>
    </linearGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E3A5F"/>
      <stop offset="100%" style="stop-color:#2563EB"/>
    </linearGradient>
  </defs>

  <!-- Roof / Solar panel -->
  <path d="M32 8 L6 34 L32 52 L58 34 Z" fill="url(#panel)"/>

  <!-- Panel grid -->
  <line x1="19" y1="28" x2="32" y2="16" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <line x1="32" y1="16" x2="45" y2="28" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <line x1="13" y1="36" x2="51" y2="36" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <line x1="10" y1="42" x2="54" y2="42" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>

  <!-- Sun -->
  <circle cx="50" cy="10" r="8" fill="url(#sun)"/>
  <line x1="50" y1="-1" x2="50" y2="-4" stroke="#F59E0B" stroke-width="2" stroke-linecap="round"/>
  <line x1="58" y1="3" x2="60" y2="1" stroke="#F59E0B" stroke-width="2" stroke-linecap="round"/>
  <line x1="61" y1="10" x2="64" y2="10" stroke="#F59E0B" stroke-width="2" stroke-linecap="round"/>
  <line x1="58" y1="17" x2="60" y2="19" stroke="#F59E0B" stroke-width="2" stroke-linecap="round"/>

  <!-- Mini chart bars -->
  <rect x="20" y="53" width="6" height="9" rx="1.5" fill="#F59E0B"/>
  <rect x="29" y="49" width="6" height="13" rx="1.5" fill="#2563EB"/>
  <rect x="38" y="45" width="6" height="17" rx="1.5" fill="#1E3A5F"/>
</svg>
